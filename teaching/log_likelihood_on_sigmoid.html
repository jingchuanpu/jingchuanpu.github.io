
<style>
  .sel-btn { background:none; border:0.5px solid var(--color-border-secondary); padding:4px 12px; font-size:12px; cursor:pointer; border-radius:var(--border-radius-md); color:var(--color-text-secondary); }
  .sel-btn.active { background:var(--color-background-secondary); color:var(--color-text-primary); border-color:var(--color-border-primary); }
  .info-card { background:var(--color-background-secondary); border-radius:var(--border-radius-lg); padding:12px 16px; font-size:12px; line-height:1.8; color:var(--color-text-secondary); min-height:72px; }
  .hl { color:var(--color-text-primary); font-weight:500; font-family:var(--font-mono); }
</style>

<div style="padding:1rem 0;">

  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center;">
    <span style="font-size:12px;color:var(--color-text-secondary);margin-right:4px;">Highlight:</span>
    <button class="sel-btn active" onclick="setMode('all')">All students</button>
    <button class="sel-btn" onclick="setMode('pass')">Passes only</button>
    <button class="sel-btn" onclick="setMode('fail')">Fails only</button>
    <button class="sel-btn" onclick="setMode('outlier')">Outliers</button>
  </div>

  <div style="position:relative;width:100%;height:360px;">
    <canvas id="main-chart"></canvas>
  </div>

  <div style="margin-top:12px;" id="info-card">
    <div class="info-card">Click any dot to see the full ℓᵢ calculation for that student.</div>
  </div>

  <div style="margin-top:10px;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;" id="stats-row" style="display:none;">
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;">
      <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:2px;">Selected ℓᵢ</div>
      <div style="font-size:18px;font-weight:500;color:var(--color-text-primary);" id="stat-li">—</div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;">
      <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:2px;">p̂ᵢ (predicted)</div>
      <div style="font-size:18px;font-weight:500;color:var(--color-text-primary);" id="stat-pi">—</div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;">
      <div style="font-size:10px;color:var(--color-text-secondary);margin-bottom:2px;">Total ℓ (all 20)</div>
      <div style="font-size:18px;font-weight:500;color:var(--color-text-primary);" id="stat-total">—</div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const students = [
  {name:"Ali",    h:1,  y:0,noise:false},{name:"Beth",  h:1.5,y:0,noise:false},
  {name:"Carlos", h:2,  y:0,noise:false},{name:"Dana",  h:2,  y:0,noise:false},
  {name:"Erin",   h:2.5,y:0,noise:false},{name:"Felix", h:3,  y:0,noise:false},
  {name:"Grace",  h:3.5,y:0,noise:false},{name:"Hamid", h:4,  y:0,noise:false},
  {name:"Isabel", h:4,  y:1,noise:false},{name:"Jonas", h:4.5,y:1,noise:false},
  {name:"Kira",   h:5,  y:1,noise:false},{name:"Luca",  h:5,  y:0,noise:true },
  {name:"Mia",    h:5.5,y:1,noise:false},{name:"Nadia", h:6,  y:1,noise:false},
  {name:"Omar",   h:6,  y:1,noise:false},{name:"Priya", h:7,  y:0,noise:true },
  {name:"Quinn",  h:7,  y:1,noise:false},{name:"Rosa",  h:8,  y:1,noise:false},
  {name:"Sam",    h:9,  y:1,noise:false},{name:"Tara",  h:10, y:1,noise:false},
];

function sigmoid(h){ return 1/(1+Math.exp(-(-4.2+0.85*h))); }
function contrib(s){
  const p=sigmoid(s.h);
  return s.y===1 ? Math.log(p) : Math.log(1-p);
}

const totalLL = students.reduce((a,s)=>a+contrib(s),0);
document.getElementById('stat-total').textContent = totalLL.toFixed(3);

const xRange = Array.from({length:200},(_,i)=>i*12/199);

function dotColor(s, alpha=1){
  if(s.y===1) return `rgba(29,158,117,${alpha})`;
  if(s.noise) return `rgba(226,75,74,${alpha})`;
  return `rgba(226,75,74,${alpha})`;
}
function borderColor(s){ return s.noise?'#BA7517': s.y===1?'#158a3e':'#a32d2d'; }

function liColor(li){
  if(li > -0.15) return '#1D9E75';
  if(li > -0.4)  return '#639922';
  if(li > -0.8)  return '#BA7517';
  return '#E24B4A';
}

let currentMode = 'all';
let selectedIdx = null;

function buildDatasets(mode){
  const activeSets = [];

  const xR = Array.from({length:200},(_,i)=>i*12/199);

  activeSets.push({
    label:'sigmoid',type:'line',
    data:xR.map(x=>({x,y:sigmoid(x)})),
    borderColor:'#4A90D9',borderWidth:2.5,
    pointRadius:0,fill:false,tension:0.4,order:10,
  });
  activeSets.push({
    label:'threshold',type:'line',
    data:[{x:0,y:0.5},{x:12,y:0.5}],
    borderColor:'#999',borderWidth:1.5,borderDash:[6,4],
    pointRadius:0,fill:false,order:11,
  });

  students.forEach((s,i)=>{
    const p = sigmoid(s.h);
    const li = contrib(s);
    const active = mode==='all' ||
      (mode==='pass'&&s.y===1) ||
      (mode==='fail'&&s.y===0) ||
      (mode==='outlier'&&s.noise);
    const alpha = active ? 1 : 0.18;
    const r = active ? 9 : 6;
    const selected = selectedIdx===i;

    activeSets.push({
      label:`s${i}`,
      data:[{x:s.h,y:s.y,idx:i}],
      backgroundColor: dotColor(s, alpha),
      borderColor: selected ? '#fff' : borderColor(s),
      borderWidth: selected ? 3 : (s.noise?3:1.5),
      pointRadius: selected ? 13 : r,
      pointHoverRadius: 13,
      order:selected?0:1,
    });

    if(active && selectedIdx===null){
      const px = sigmoid(s.h);
      const scored = s.y===1 ? px : 1-px;
      activeSets.push({
        label:`line${i}`,type:'line',
        data:[{x:s.h,y:s.y},{x:s.h,y:px}],
        borderColor: liColor(li),
        borderWidth:1.5,
        borderDash:[3,3],
        pointRadius:0,fill:false,order:5,
      });
      activeSets.push({
        label:`pred${i}`,
        data:[{x:s.h,y:px}],
        backgroundColor: liColor(li),
        borderColor:'#fff',
        borderWidth:1.5,
        pointRadius:5,
        pointStyle:'triangle',
        order:3,
      });
    }
  });

  if(selectedIdx!==null){
    const s=students[selectedIdx];
    const px=sigmoid(s.h);
    activeSets.push({
      label:'sel-line',type:'line',
      data:[{x:s.h,y:s.y},{x:s.h,y:px}],
      borderColor:'#fff',borderWidth:2.5,
      pointRadius:0,fill:false,order:2,
    });
    activeSets.push({
      label:'sel-pred',
      data:[{x:s.h,y:px}],
      backgroundColor:'#fff',
      borderColor: liColor(contrib(s)),
      borderWidth:2.5,
      pointRadius:8,
      order:1,
    });
  }

  return activeSets;
}

const chart = new Chart(document.getElementById('main-chart'),{
  type:'scatter',
  data:{ datasets: buildDatasets('all') },
  options:{
    responsive:true, maintainAspectRatio:false,
    animation:{duration:200},
    layout:{ padding:{top:16,right:16,bottom:8,left:8} },
    plugins:{
      legend:{display:false},
      tooltip:{
        filter: ctx => ctx.dataset.label && ctx.dataset.label.match(/^s\d+$/),
        callbacks:{
          title: ctx => {
            const d=ctx[0].raw;
            const s=students[d.idx];
            return s ? s.name : '';
          },
          label: ctx => {
            const d=ctx.raw;
            const s=students[d.idx];
            if(!s) return '';
            const p=sigmoid(s.h);
            const li=contrib(s);
            const term = s.y===1
              ? `1·log(${p.toFixed(2)}) = ${li.toFixed(3)}`
              : `1·log(1−${p.toFixed(2)}) = ${li.toFixed(3)}`;
            return [`${s.h}h studied | y=${s.y}`, `p̂ = ${p.toFixed(3)}`, `ℓᵢ = ${term}`];
          }
        }
      }
    },
    onClick:(e,els)=>{
      if(!els.length){ selectedIdx=null; clearInfo(); redraw(); return; }
      const lbl=chart.data.datasets[els[0].datasetIndex].label;
      if(!lbl||!lbl.match(/^s\d+$/)) return;
      const i=parseInt(lbl.slice(1));
      selectedIdx = selectedIdx===i ? null : i;
      selectedIdx===null ? clearInfo() : showInfo(i);
      redraw();
    },
    scales:{
      x:{type:'linear',min:0,max:12,
        title:{display:true,text:'Hours studied',font:{size:13}},
        ticks:{stepSize:1,font:{size:12}},
        grid:{color:'rgba(136,135,128,0.15)'}},
      y:{min:-0.12,max:1.15,
        title:{display:true,text:'P(pass)',font:{size:13}},
        ticks:{callback:v=>v===0?'0.0':v===1?'1.0':'',stepSize:0.25,font:{size:12}},
        grid:{color:'rgba(136,135,128,0.15)'}}
    }
  }
});

function redraw(){
  chart.data.datasets = buildDatasets(currentMode);
  chart.update();
}

function showInfo(i){
  const s=students[i];
  const p=sigmoid(s.h);
  const li=contrib(s);
  document.getElementById('stat-li').textContent=li.toFixed(3);
  document.getElementById('stat-li').style.color=liColor(li);
  document.getElementById('stat-pi').textContent=p.toFixed(3);
  document.getElementById('stat-total').textContent=totalLL.toFixed(3);
  document.getElementById('stats-row').style.display='grid';

  const termUsed = s.y===1
    ? `y=1 → uses <span class="hl">log(p̂)</span> = log(${p.toFixed(3)}) = <span class="hl" style="color:${liColor(li)}">${li.toFixed(3)}</span>`
    : `y=0 → uses <span class="hl">log(1−p̂)</span> = log(${(1-p).toFixed(3)}) = <span class="hl" style="color:${liColor(li)}">${li.toFixed(3)}</span>`;

  const verdict = li > -0.2 ? 'small penalty — model is confident and correct'
    : li > -0.5 ? 'moderate penalty — model is somewhat uncertain'
    : li > -1.0 ? 'large penalty — model is wrong or uncertain'
    : 'very large penalty — model is confident but wrong';

  document.getElementById('info-card').innerHTML = `<div class="info-card">
    <strong style="color:var(--color-text-primary)">${s.name}</strong> &nbsp;·&nbsp; ${s.h}h studied &nbsp;·&nbsp; actual y = ${s.y===1?'<span style="color:#1D9E75;font-weight:500">Pass</span>':'<span style="color:#E24B4A;font-weight:500">Fail</span>'}<br>
    p̂ = σ(−4.2 + 0.85×${s.h}) = <span class="hl">${p.toFixed(3)}</span><br>
    ${termUsed}<br>
    <span style="color:${liColor(li)}">${verdict}</span>
  </div>`;
}

function clearInfo(){
  selectedIdx=null;
  document.getElementById('stats-row').style.display='none';
  document.getElementById('info-card').innerHTML='<div class="info-card">Click any dot to see the full ℓᵢ calculation for that student.</div>';
}

function setMode(m){
  currentMode=m; selectedIdx=null; clearInfo();
  document.querySelectorAll('.sel-btn').forEach((b,i)=>{
    b.classList.toggle('active',['all','pass','fail','outlier'][i]===m);
  });
  redraw();
}

document.getElementById('stats-row').style.display='none';
</script>
